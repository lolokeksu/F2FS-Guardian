# F2FS Guardian v1.1
# All values are integers. Unknown keys are ignored.

# Master switch for the daemon: 1=enabled, 0=disabled.
ENABLED=1

# Automatic maintenance: 1=enabled, 0=manual requests only.
AUTO_ENABLED=1

# Menu language: 0=Russian, 1=English, 2=detect system locale once.
MENU_LANGUAGE=2

# How often the daemon reevaluates the filesystem.
CHECK_INTERVAL_MIN=60

# Minimum time between successful maintenance sessions.
MIN_INTERVAL_HOURS=24

# The display must remain off for at least this long.
MIN_SCREEN_OFF_MIN=20

# Require AC/USB/wireless charging before automatic or queued maintenance.
REQUIRE_CHARGING=1

# Minimum battery level.
MIN_BATTERY_PERCENT=50

# Maximum battery temperature in tenths of a degree Celsius: 390 = 39.0 C.
MAX_BATTERY_TEMP_DECIC=390

# Normal trigger: both filesystem usage and dirty-segment limits must be met.
STORAGE_USAGE_TRIGGER_PERCENT=84
DIRTY_SEGMENTS_TRIGGER=256

# Critical trigger: all three limits must be met.
CRITICAL_USAGE_PERCENT=95
CRITICAL_DIRTY_SEGMENTS=128
FREE_SEGMENTS_CRITICAL=96

# Maximum observed block-device operations per second before maintenance is skipped.
MAX_IO_OPS_PER_SEC=25
IO_SAMPLE_SEC=5

# Standard F2FS modes only: 2=urgent-low, 1=urgent-high.
NORMAL_GC_MODE=2
CRITICAL_GC_MODE=1

# Strict session time limits.
NORMAL_DURATION_SEC=480
CRITICAL_DURATION_SEC=90

# Recheck safety conditions during an active session.
ACTIVE_RECHECK_SEC=15

# Persistent log size limit.
LOG_MAX_KB=256
