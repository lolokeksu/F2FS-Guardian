name: Fix README headers

on:
  push:
    branches: [main]
    paths:
      - '.readme-header-trigger'
      - '.github/workflows/fix-readme-header.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace README headers
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          en_header = '''<h1 align="center">F2FS Guardian</h1>

          <hr>

          <h2 align="center">Transparent, safety-gated F2FS maintenance for rooted Android 13–16 devices</h2>

          <p align="center">
            <a href="https://github.com/lolokeksu/F2FS-Guardian/releases/tag/v1"><img alt="Release v1" src="https://img.shields.io/badge/release-v1-0ea5e9"></a>
            <a href="https://github.com/lolokeksu/F2FS-Guardian/actions/workflows/ci.yml"><img alt="Validate and build" src="https://github.com/lolokeksu/F2FS-Guardian/actions/workflows/ci.yml/badge.svg"></a>
            <img alt="Android 13–16" src="https://img.shields.io/badge/Android-13--16-3ddc84?logo=android&logoColor=white">
          </p>

          <p align="center">
            <img alt="Tested device" src="https://img.shields.io/badge/tested-Realme%20GT%20Neo%205%20SE-64748b">
            <img alt="Root APatch tested" src="https://img.shields.io/badge/root-APatch%20tested-f97316">
            <img alt="Filesystem F2FS" src="https://img.shields.io/badge/filesystem-F2FS-334155">
          </p>

          <p align="center">
            <img alt="POSIX shell runtime" src="https://img.shields.io/badge/runtime-POSIX%20shell-a3a3a3?logo=gnu-bash&logoColor=111827">
            <a href="LICENSE"><img alt="GPL-3.0-only" src="https://img.shields.io/badge/license-GPL--3.0--only-0ea5e9"></a>
            <img alt="No telemetry" src="https://img.shields.io/badge/telemetry-none-22c55e">
          </p>

          <p align="center"><a href="README_RU.md">Russian</a> · <a href="https://github.com/lolokeksu/F2FS-Guardian/releases">Release</a> · <a href="SECURITY.md">Security</a></p>'''

          ru_header = '''<h1 align="center">F2FS Guardian</h1>

          <hr>

          <h2 align="center">Прозрачное и безопасно ограниченное обслуживание F2FS для Android 13–16 с root</h2>

          <p align="center">
            <a href="https://github.com/lolokeksu/F2FS-Guardian/releases/tag/v1"><img alt="Релиз v1" src="https://img.shields.io/badge/release-v1-0ea5e9"></a>
            <a href="https://github.com/lolokeksu/F2FS-Guardian/actions/workflows/ci.yml"><img alt="Проверка и сборка" src="https://github.com/lolokeksu/F2FS-Guardian/actions/workflows/ci.yml/badge.svg"></a>
            <img alt="Android 13–16" src="https://img.shields.io/badge/Android-13--16-3ddc84?logo=android&logoColor=white">
          </p>

          <p align="center">
            <img alt="Tested device" src="https://img.shields.io/badge/tested-Realme%20GT%20Neo%205%20SE-64748b">
            <img alt="Root APatch tested" src="https://img.shields.io/badge/root-APatch%20tested-f97316">
            <img alt="Filesystem F2FS" src="https://img.shields.io/badge/filesystem-F2FS-334155">
          </p>

          <p align="center">
            <img alt="POSIX shell runtime" src="https://img.shields.io/badge/runtime-POSIX%20shell-a3a3a3?logo=gnu-bash&logoColor=111827">
            <a href="LICENSE"><img alt="GPL-3.0-only" src="https://img.shields.io/badge/license-GPL--3.0--only-0ea5e9"></a>
            <img alt="No telemetry" src="https://img.shields.io/badge/telemetry-none-22c55e">
          </p>

          <p align="center"><a href="README.md">English</a> · <a href="https://github.com/lolokeksu/F2FS-Guardian/releases">Релизы</a> · <a href="https://github.com/lolokeksu/F2FS-Guardian/issues">Проблема</a> · <a href="SECURITY.md">Безопасность</a></p>'''

          def replace_header(path: str, header: str) -> None:
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              marker = '\n---\n'
              if marker not in text:
                  raise SystemExit(f'Header separator not found in {path}')
              body = text.split(marker, 1)[1].lstrip('\n')
              body = '\n'.join(
                  line for line in body.splitlines()
                  if 'docs/4PDA_POST_RU.md' not in line
              ).rstrip() + '\n'
              p.write_text(header + marker + '\n' + body, encoding='utf-8')

          replace_header('README.md', en_header)
          replace_header('README_RU.md', ru_header)

          Path('docs/4PDA_POST_RU.md').unlink(missing_ok=True)
          Path('.readme-header-trigger').unlink(missing_ok=True)
          Path('.github/workflows/fix-readme-header.yml').unlink(missing_ok=True)
          PY

      - name: Commit corrected README headers
        shell: bash
        run: |
          git config user.name 'Lolokeksu'
          git config user.email '272540245+lolokeksu@users.noreply.github.com'
          git add -A
          git commit -m 'Fix README navigation and headers'
          git push origin main
