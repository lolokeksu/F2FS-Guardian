name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install test tools
        run: sudo apt-get update && sudo apt-get install -y busybox file python3 zip
      - name: Run tests
        run: ./scripts/test.sh
      - name: Build deterministic archives
        run: ./scripts/build.sh
      - name: Verify checksums
        run: cd dist && sha256sum -c SHA256SUMS
