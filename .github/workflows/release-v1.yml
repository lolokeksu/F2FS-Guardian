name: Publish v1

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-v1
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y busybox zip
      - name: Test
        run: ./scripts/test.sh
      - name: Build
        run: ./scripts/build.sh
      - name: Verify
        run: cd dist && sha256sum -c SHA256SUMS
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1 >/dev/null 2>&1; then
            echo "Release v1 already exists; leaving it immutable."
          else
            gh release create v1 \
              dist/F2FS-Guardian-v1.zip \
              dist/F2FS-Guardian-v1-source.zip \
              dist/SHA256SUMS \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "F2FS Guardian v1" \
              --notes-file docs/GITHUB_RELEASE_V1.md
          fi
